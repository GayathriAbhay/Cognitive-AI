services:
  # Backend Web Service
  - type: web
    name: cogni-backend
    runtime: python
    rootDir: neuro-ai-backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cogni-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false

  # Frontend Web Service (Vite)
  - type: web
    name: cogni-frontend
    runtime: node
    rootDir: neuro-ai-frontend
    buildCommand: npm install && npm run build
    startCommand: npm run preview
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: cogni-backend
          property: host

databases:
  - name: cogni-db
    plan: free
